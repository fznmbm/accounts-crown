const {useState,useEffect,useRef,createElement:h}=React;
const fmt=n=>new Intl.NumberFormat('en-GB',{style:'currency',currency:'GBP'}).format(n||0);
const fmtD=d=>d?new Date(d).toLocaleDateString('en-GB'):'';
const uid=()=>`${Date.now()}_${Math.random().toString(36).substr(2,5)}`;
const MO=['January','February','March','April','May','June','July','August','September','October','November','December'];

/* ── Storage (localStorage for local use) ── */
const KEYS={inv:'cc_inv2',staff:'cc_staff2',pay:'cc_pay2',rem:'cc_rem2'};
const db={
  get(k){try{const v=localStorage.getItem(k);return v?JSON.parse(v):[]}catch{return[]}},
  set(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch{}}
};

/* ── PDF Parser ── */
async function parsePDF(file){
  if(!window.pdfjsLib){
    await new Promise((res,rej)=>{
      const s=document.createElement('script');
      s.src='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
      s.onload=res;s.onerror=rej;document.head.appendChild(s);
    });
    window.pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  }
  const buf=await file.arrayBuffer();
  const pdf=await window.pdfjsLib.getDocument({data:buf}).promise;
  let txt='';
  for(let i=1;i<=pdf.numPages;i++){
    const pg=await pdf.getPage(i);
    const ct=await pg.getTextContent();
    txt+=ct.items.map(x=>x.str).join(' ')+'\n';
  }
  const items=[];
  const re=/\b(\d{4,5})\b\s+£([\d,]+\.\d{2})/g;
  let m;
  while((m=re.exec(txt))!==null){
    const n=m[1],a=parseFloat(m[2].replace(/,/g,''));
    if(parseInt(n)>999&&parseInt(n)<99999&&a>0&&a<50000)items.push({invoiceNumber:n,amount:a});
  }
  const seen=new Set();
  const unique=items.filter(x=>!seen.has(x.invoiceNumber)&&seen.add(x.invoiceNumber));
  const tm=txt.match(/Payment Total\s+£([\d,]+\.\d{2})/);
  const total=tm?parseFloat(tm[1].replace(/,/g,'')):unique.reduce((s,x)=>s+x.amount,0);
  const pn=txt.match(/Payment Number\s*[:\-]\s*(\d+)/i);
  const dm=txt.match(/(\d{2}\/\d{2}\/\d{4})/);
  return{items:unique,total,paymentNumber:pn?.[1]||'',rawDate:dm?.[1]||''};
}

/* ── Style helpers ── */
const sc={
  sidebar:{width:'200px',flexShrink:0,background:'#ffffff',borderRight:'1px solid #e0e0e0',display:'flex',flexDirection:'column',height:'100%'},
  nav:(a)=>({display:'flex',alignItems:'center',gap:'8px',padding:'7px 10px',borderRadius:'6px',fontSize:'13px',fontWeight:a?500:400,background:a?'#f0f0f0':'transparent',color:a?'#111':'#666',border:'none',cursor:'pointer',width:'100%',textAlign:'left'}),
  card:{background:'#ffffff',border:'1px solid #e0e0e0',borderRadius:'10px',padding:'1rem 1.25rem'},
  metric:{background:'#f0f0f0',borderRadius:'6px',padding:'12px 14px'},
  inp:{width:'100%'},
  sel:{width:'100%'},
  btn:(v='p')=>{
    const vs={
      p:{bg:'#e8f0fe',c:'#1a56a0',bc:'#b3caf5'},
      s:{bg:'#f0f0f0',c:'#555',bc:'#ccc'},
      d:{bg:'#fdecea',c:'#b91c1c',bc:'#f5b8b8'},
      g:{bg:'#e6f4ea',c:'#1e7e34',bc:'#a8d5b5'}
    };
    const t=vs[v]||vs.p;
    return{background:t.bg,color:t.c,border:`1px solid ${t.bc}`,borderRadius:'6px',padding:'6px 12px',fontSize:'13px',fontWeight:500,cursor:'pointer',display:'inline-flex',alignItems:'center',gap:'6px'};
  },
  badge:(t)=>{
    const m={
      paid:{bg:'#e6f4ea',c:'#1e7e34'},
      partial:{bg:'#fff8e1',c:'#b45309'},
      unpaid:{bg:'#fdecea',c:'#b91c1c'},
      driver:{bg:'#e8f0fe',c:'#1a56a0'},
      pa:{bg:'#e8f0fe',c:'#1a56a0'},
      driver_pa:{bg:'#e8f0fe',c:'#1a56a0'},
      regular:{bg:'#f0f0f0',c:'#555'},
      advance:{bg:'#fff8e1',c:'#b45309'},
      partial_pay:{bg:'#f0f0f0',c:'#555'}
    };
    const x=m[t]||m.regular;
    return{background:x.bg,color:x.c,padding:'2px 8px',borderRadius:'6px',fontSize:'11px',fontWeight:500,display:'inline-block'};
  },
  overlay:{position:'fixed',inset:0,zIndex:50,background:'rgba(0,0,0,0.35)',display:'flex',alignItems:'center',justifyContent:'center',padding:'1rem'},
  modal:{background:'#fff',border:'1px solid #ddd',borderRadius:'10px',width:'100%',maxWidth:'500px',maxHeight:'90vh',overflowY:'auto'},
};

/* ── Reusable components ── */
function Fl({lbl,ch}){return h('div',{style:{display:'grid',gap:'4px'}},h('div',{style:{fontSize:'12px',color:'#555',fontWeight:500}},lbl),ch)}
function Met({lbl,val,col}){return h('div',{style:sc.metric},h('div',{style:{fontSize:'12px',color:'#666',marginBottom:'4px'}},lbl),h('div',{style:{fontSize:'20px',fontWeight:500,color:col||'#111'}},val))}
function Bdg({t,lbl}){return h('span',{style:sc.badge(t)},lbl||t)}

function Modal({title,onClose,children,wide}){
  return h('div',{style:sc.overlay,onClick:e=>e.target===e.currentTarget&&onClose()},
    h('div',{style:{...sc.modal,maxWidth:wide?'660px':'500px'}},
      h('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'12px 16px',borderBottom:'1px solid #eee'}},
        h('div',{style:{fontSize:'14px',fontWeight:500}},title),
        h('button',{onClick:onClose,style:{background:'none',border:'none',cursor:'pointer',color:'#666',fontSize:'20px',lineHeight:1,padding:'0 4px'}},'×')
      ),
      h('div',{style:{padding:'16px'}},children)
    )
  );
}

function THead({cols}){
  return h('thead',null,h('tr',{style:{borderBottom:'1px solid #eee'}},
    cols.map((c,i)=>h('th',{key:i,style:{padding:'7px 10px',textAlign:c.r?'right':'left',fontSize:'12px',fontWeight:500,color:'#666',whiteSpace:'nowrap',width:c.w}},c.l||c))
  ));
}
function TRow({cells,cols}){
  return h('tr',{style:{borderBottom:'1px solid #f0f0f0'}},
    cells.map((c,i)=>h('td',{key:i,style:{padding:'7px 10px',textAlign:cols[i]?.r?'right':'left',fontSize:'13px',color:'#111'}},c))
  );
}

/* ── DASHBOARD ── */
function Dashboard({invoices,staff,staffPayments,remittances,sm,sy,setSM,setSY}){
  const mi=invoices.filter(x=>x.month===sm&&x.year===sy);
  const invoiced=mi.reduce((s,x)=>s+x.amount,0);
  const received=mi.reduce((s,x)=>s+(x.paidAmount||0),0);
  const outstanding=invoiced-received;
  const mp=staffPayments.filter(p=>p.month===sm&&p.year===sy);
  const cost=mp.reduce((s,p)=>s+p.amount,0);
  const profit=received-cost;
  const unpaid=mi.filter(x=>x.status!=='paid');
  return h('div',{style:{padding:'1.25rem',overflowY:'auto',flex:1}},
    h('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'1.25rem'}},
      h('div',null,
        h('div',{style:{fontSize:'17px',fontWeight:500}},'Dashboard'),
        h('div',{style:{fontSize:'12px',color:'#666'}},'Crown Cars Ltd — Account overview')
      ),
      h('div',{style:{display:'flex',gap:'6px'}},
        h('select',{style:{...sc.sel,width:'120px'},value:sm,onChange:e=>setSM(Number(e.target.value))},MO.map((m,i)=>h('option',{key:i,value:i},m))),
        h('select',{style:{...sc.sel,width:'80px'},value:sy,onChange:e=>setSY(Number(e.target.value))},[2024,2025,2026,2027].map(y=>h('option',{key:y,value:y},y)))
      )
    ),
    h('div',{style:{display:'grid',gridTemplateColumns:'repeat(5,minmax(0,1fr))',gap:'10px',marginBottom:'1.25rem'}},
      h(Met,{lbl:'Total invoiced',val:fmt(invoiced)}),
      h(Met,{lbl:'Received (WSCC)',val:fmt(received),col:'#1e7e34'}),
      h(Met,{lbl:'Outstanding',val:fmt(outstanding),col:outstanding>0?'#b45309':'#666'}),
      h(Met,{lbl:'Staff paid',val:fmt(cost)}),
      h(Met,{lbl:'Net profit',val:fmt(profit),col:profit>=0?'#1e7e34':'#b91c1c'})
    ),
    unpaid.length>0&&h('div',{style:{background:'#fff8e1',border:'1px solid #fcd34d',borderRadius:'6px',padding:'10px 14px',marginBottom:'1.25rem'}},
      h('div',{style:{fontSize:'13px',fontWeight:500,color:'#b45309',marginBottom:'6px'}},`${unpaid.length} invoice${unpaid.length>1?'s':''} need chasing — ${MO[sm]} ${sy}`),
      h('div',{style:{display:'flex',flexWrap:'wrap',gap:'6px'}},
        unpaid.map(x=>h('span',{key:x.id,style:{fontSize:'12px',background:'#fff',border:'1px solid #fcd34d',borderRadius:'6px',padding:'2px 8px',color:'#b45309'}},`#${x.number} — ${fmt((x.amount||0)-(x.paidAmount||0))} outstanding`))
      )
    ),
    h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'12px'}},
      h('div',{style:sc.card},
        h('div',{style:{fontSize:'13px',fontWeight:500,marginBottom:'10px'}},'Recent remittances'),
        remittances.length===0
          ?h('div',{style:{fontSize:'13px',color:'#666',textAlign:'center',padding:'1rem 0'}},'None yet — upload a PDF')
          :[...remittances].sort((a,b)=>b.createdAt-a.createdAt).slice(0,5).map(r=>
            h('div',{key:r.id,style:{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'7px 0',borderBottom:'1px solid #f0f0f0'}},
              h('div',null,
                h('div',{style:{fontSize:'13px',fontWeight:500}},`Payment #${r.paymentNumber}`),
                h('div',{style:{fontSize:'12px',color:'#666'}},`${r.items?.length} invoices · ${fmtD(r.paymentDate)}`)
              ),
              h('div',{style:{fontSize:'13px',fontWeight:500,color:'#1e7e34'}},fmt(r.total))
            )
          )
      ),
      h('div',{style:sc.card},
        h('div',{style:{fontSize:'13px',fontWeight:500,marginBottom:'10px'}},`Staff — ${SM[sm]} ${sy}`),
        staff.length===0
          ?h('div',{style:{fontSize:'13px',color:'#666',textAlign:'center',padding:'1rem 0'}},'No staff added yet')
          :staff.slice(0,6).map(s=>{
            const paid=staffPayments.filter(p=>p.staffId===s.id&&p.month===sm&&p.year===sy).reduce((sum,p)=>sum+p.amount,0);
            return h('div',{key:s.id,style:{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'7px 0',borderBottom:'1px solid #f0f0f0'}},
              h('div',{style:{display:'flex',alignItems:'center',gap:'8px'}},
                h('div',{style:{width:'26px',height:'26px',borderRadius:'50%',background:'#e8f0fe',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'11px',fontWeight:500,color:'#1a56a0',flexShrink:0}},s.name[0]),
                h('div',null,
                  h('div',{style:{fontSize:'13px',fontWeight:500}},s.name),
                  h('div',{style:{fontSize:'11px',color:'#666',textTransform:'capitalize'}},s.type?.replace('_',' '))
                )
              ),
              h('div',{style:{fontSize:'13px',fontWeight:500}},fmt(paid))
            );
          })
      )
    )
  );
}

/* ── REMITTANCES ── */
function RemittancesPage({invoices,remittances,setRemittances,setInvoices}){
  const [uploading,setUploading]=useState(false);
  const [parsed,setParsed]=useState(null);
  const [err,setErr]=useState('');
  const [detail,setDetail]=useState(null);
  const fRef=useRef();

  const handleUpload=async e=>{
    const file=e.target.files[0];if(!file)return;
    setUploading(true);setErr('');
    try{
      const r=await parsePDF(file);
      if(r.items.length===0)setErr('No invoice data found. Please check the PDF.');
      else setParsed({...r,fileName:file.name});
    }catch(ex){setErr('Parse failed: '+ex.message);}
    setUploading(false);e.target.value='';
  };

  const handleConfirm=()=>{
    if(!parsed)return;
    let paymentDate=new Date().toISOString().split('T')[0];
    if(parsed.rawDate){const[d,mo,y]=parsed.rawDate.split('/');const b=new Date(y,mo-1,parseInt(d)+2);paymentDate=b.toISOString().split('T')[0];}
    const rem={id:uid(),paymentNumber:parsed.paymentNumber,total:parsed.total,paymentDate,items:parsed.items,fileName:parsed.fileName,createdAt:Date.now()};
    const updInv=invoices.map(inv=>{
      const match=parsed.items.find(it=>it.invoiceNumber===inv.number);
      if(!match)return inv;
      return{...inv,paidAmount:match.amount,status:Math.abs(match.amount-inv.amount)<0.01?'paid':'partial',remittanceId:rem.id};
    });
    setRemittances([...remittances,rem]);
    setInvoices(updInv);
    setParsed(null);
  };

  return h('div',{style:{padding:'1.25rem',overflowY:'auto',flex:1}},
    h('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'1.25rem'}},
      h('div',null,h('div',{style:{fontSize:'17px',fontWeight:500}},'Remittances'),h('div',{style:{fontSize:'12px',color:'#666'}},'Upload WSCC payment remittance PDFs')),
      h('button',{style:sc.btn('p'),onClick:()=>fRef.current?.click(),disabled:uploading},uploading?'Parsing PDF...':'↑ Upload remittance PDF')
    ),
    h('input',{ref:fRef,type:'file',accept:'.pdf',onChange:handleUpload,style:{display:'none'}}),
    err&&h('div',{style:{background:'#fdecea',border:'1px solid #f5b8b8',borderRadius:'6px',padding:'10px 14px',marginBottom:'12px',fontSize:'13px',color:'#b91c1c'}},err),
    parsed&&h('div',{style:{...sc.card,border:'1px solid #b3caf5',background:'#e8f0fe',marginBottom:'12px'}},
      h('div',{style:{fontSize:'13px',fontWeight:500,color:'#1a56a0',marginBottom:'10px'}},'PDF parsed — review before saving'),
      h('div',{style:{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:'8px',marginBottom:'12px'}},
        [['Payment #',parsed.paymentNumber||'N/A'],['Total',fmt(parsed.total)],['Invoices found',parsed.items.length]].map(([l,v])=>
          h('div',{key:l,style:{background:'#fff',borderRadius:'6px',padding:'8px 12px'}},
            h('div',{style:{fontSize:'11px',color:'#666'}},l),
            h('div',{style:{fontSize:'14px',fontWeight:500}},v)
          )
        )
      ),
      h('div',{style:{background:'#fff',borderRadius:'6px',maxHeight:'180px',overflowY:'auto',marginBottom:'12px'}},
        h('table',{style:{width:'100%',fontSize:'12px'}},
          h('thead',null,h('tr',{style:{borderBottom:'1px solid #eee'}},
            ['Invoice #','Amount','Status'].map(x=>h('th',{key:x,style:{padding:'6px 10px',textAlign:'left',fontWeight:500,color:'#666'}},x))
          )),
          h('tbody',null,parsed.items.map((it,i)=>{
            const match=invoices.find(inv=>inv.number===it.invoiceNumber);
            return h('tr',{key:i,style:{borderBottom:'1px solid #f0f0f0'}},
              h('td',{style:{padding:'5px 10px',fontFamily:'monospace'}},it.invoiceNumber),
              h('td',{style:{padding:'5px 10px',fontWeight:500}},fmt(it.amount)),
              h('td',{style:{padding:'5px 10px',color:match?'#1e7e34':'#b45309'}},match?'✓ matched':'no invoice found')
            );
          }))
        )
      ),
      h('div',{style:{display:'flex',gap:'8px'}},
        h('button',{style:sc.btn('g'),onClick:handleConfirm},'Save & update invoices'),
        h('button',{style:sc.btn('s'),onClick:()=>setParsed(null)},'Cancel')
      )
    ),
    h('div',{style:sc.card},
      h('div',{style:{fontSize:'13px',fontWeight:500,marginBottom:'10px'}},`All remittances (${remittances.length})`),
      remittances.length===0
        ?h('div',{style:{textAlign:'center',padding:'2rem',color:'#666',fontSize:'13px'}},'No remittances yet. Upload a WSCC PDF to get started.')
        :[...remittances].sort((a,b)=>b.createdAt-a.createdAt).map(r=>
          h('div',{key:r.id,onClick:()=>setDetail(r),style:{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 0',borderBottom:'1px solid #f0f0f0',cursor:'pointer'}},
            h('div',null,
              h('div',{style:{fontSize:'13px',fontWeight:500}},`Payment #${r.paymentNumber}`),
              h('div',{style:{fontSize:'12px',color:'#666'}},`${r.items?.length} invoices · paid ${fmtD(r.paymentDate)} · ${r.fileName}`)
            ),
            h('div',{style:{fontSize:'13px',fontWeight:500,color:'#1e7e34'}},fmt(r.total))
          )
        )
    ),
    detail&&h(Modal,{title:`Remittance — Payment #${detail.paymentNumber}`,onClose:()=>setDetail(null),wide:true},
      h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'8px',marginBottom:'12px'}},
        h('div',{style:sc.metric},h('div',{style:{fontSize:'11px',color:'#666'}},'Payment date'),h('div',{style:{fontSize:'14px',fontWeight:500}},fmtD(detail.paymentDate))),
        h('div',{style:sc.metric},h('div',{style:{fontSize:'11px',color:'#666'}},'Total'),h('div',{style:{fontSize:'14px',fontWeight:500,color:'#1e7e34'}},fmt(detail.total)))
      ),
      h('table',{style:{width:'100%',fontSize:'13px'}},
        h('thead',null,h('tr',{style:{borderBottom:'1px solid #eee'}},
          h('th',{style:{padding:'6px 8px',textAlign:'left',fontWeight:500,color:'#666'}},'Invoice #'),
          h('th',{style:{padding:'6px 8px',textAlign:'right',fontWeight:500,color:'#666'}},'Amount')
        )),
        h('tbody',null,
          detail.items?.map((it,i)=>h('tr',{key:i,style:{borderBottom:'1px solid #f0f0f0'}},
            h('td',{style:{padding:'6px 8px',fontFamily:'monospace'}},it.invoiceNumber),
            h('td',{style:{padding:'6px 8px',textAlign:'right',fontWeight:500}},fmt(it.amount))
          )),
          h('tr',{style:{background:'#f5f5f5'}},
            h('td',{style:{padding:'6px 8px',fontWeight:500}},'Total'),
            h('td',{style:{padding:'6px 8px',textAlign:'right',fontWeight:500,color:'#1e7e34'}},fmt(detail.total))
          )
        )
      )
    )
  );
}

/* ── INVOICES ── */
function InvoicesPage({invoices,setInvoices}){
  const [showAdd,setShowAdd]=useState(false);
  const [edit,setEdit]=useState(null);
  const [fs,setFs]=useState('all');
  const [fm,setFm]=useState('all');
  const [q,setQ]=useState('');
  const ef={number:'',amount:'',month:new Date().getMonth(),year:new Date().getFullYear(),description:'',status:'unpaid',paidAmount:''};
  const [form,setForm]=useState(ef);

  const save=()=>{
    if(!form.number||!form.amount)return;
    const inv={id:edit?.id||uid(),number:form.number,amount:parseFloat(form.amount),month:parseInt(form.month),year:parseInt(form.year),description:form.description,status:form.status,paidAmount:form.status==='paid'?parseFloat(form.amount):form.status==='partial'?parseFloat(form.paidAmount||0):0,createdAt:edit?.createdAt||Date.now()};
    setInvoices(edit?invoices.map(x=>x.id===edit.id?inv:x):[...invoices,inv]);
    setShowAdd(false);setEdit(null);setForm(ef);
  };

  const filtered=invoices.filter(x=>{
    if(fs!=='all'&&x.status!==fs)return false;
    if(fm!=='all'&&x.month!==parseInt(fm))return false;
    if(q&&!x.number.includes(q)&&!x.description?.toLowerCase().includes(q.toLowerCase()))return false;
    return true;
  }).sort((a,b)=>b.createdAt-a.createdAt);

  return h('div',{style:{padding:'1.25rem',overflowY:'auto',flex:1}},
    h('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'1.25rem'}},
      h('div',null,h('div',{style:{fontSize:'17px',fontWeight:500}},'Invoices'),h('div',{style:{fontSize:'12px',color:'#666'}},'Track invoices sent to WSCC')),
      h('button',{style:sc.btn('p'),onClick:()=>{setForm(ef);setEdit(null);setShowAdd(true);}},'+  Add invoice')
    ),
    h('div',{style:{display:'flex',gap:'8px',marginBottom:'12px',flexWrap:'wrap'}},

/* ── REPORTS ── */
function ReportsPage({invoices,staffPayments,staff}){
  const [yr,setYr]=useState(new Date().getFullYear());
  const months=Array.from({length:12},(_,i)=>{
    const inv=invoices.filter(x=>x.month===i&&x.year===yr);
    const pay=staffPayments.filter(p=>p.month===i&&p.year===yr);
    const invoiced=inv.reduce((s,x)=>s+x.amount,0);
    const received=inv.reduce((s,x)=>s+(x.paidAmount||0),0);
    const cost=pay.reduce((s,p)=>s+p.amount,0);
    return{i,invoiced,received,cost,profit:received-cost};
  });
  const tot=months.reduce((a,m)=>({invoiced:a.invoiced+m.invoiced,received:a.received+m.received,cost:a.cost+m.cost,profit:a.profit+m.profit}),{invoiced:0,received:0,cost:0,profit:0});
  const sb=staff.map(s=>({...s,paid:staffPayments.filter(p=>p.staffId===s.id&&p.year===yr).reduce((sum,p)=>sum+p.amount,0),cnt:staffPayments.filter(p=>p.staffId===s.id&&p.year===yr).length})).sort((a,b)=>b.paid-a.paid);

  return h('div',{style:{padding:'1.25rem',overflowY:'auto',flex:1}},
    h('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'1.25rem'}},
      h('div',null,h('div',{style:{fontSize:'17px',fontWeight:500}},'Reports'),h('div',{style:{fontSize:'12px',color:'#666'}},'Annual P&L and financial breakdown')),
      h('select',{style:{...sc.sel,width:'80px'},value:yr,onChange:e=>setYr(Number(e.target.value))},[2024,2025,2026,2027].map(y=>h('option',{key:y,value:y},y)))
    ),
    h('div',{style:{display:'grid',gridTemplateColumns:'repeat(4,minmax(0,1fr))',gap:'10px',marginBottom:'1.25rem'}},
      h(Met,{lbl:`${yr} invoiced`,val:fmt(tot.invoiced)}),
      h(Met,{lbl:`${yr} received`,val:fmt(tot.received),col:'#1e7e34'}),
      h(Met,{lbl:`${yr} staff costs`,val:fmt(tot.cost)}),
      h(Met,{lbl:`${yr} net profit`,val:fmt(tot.profit),col:tot.profit>=0?'#1e7e34':'#b91c1c'})
    ),
    h('div',{style:{...sc.card,marginBottom:'12px'}},
      h('div',{style:{fontSize:'13px',fontWeight:500,marginBottom:'10px'}},`Monthly P&L — ${yr}`),
      h('table',{style:{width:'100%',fontSize:'12px',tableLayout:'fixed'}},
        h('thead',null,h('tr',{style:{borderBottom:'1px solid #eee'}},
          ['Month','Invoiced','WSCC received','Staff costs','Net profit','Margin'].map((x,i)=>
            h('th',{key:i,style:{padding:'7px 10px',textAlign:i===0?'left':'right',fontWeight:500,color:'#666',fontSize:'11px'}},x)
          )
        )),
        h('tbody',null,
          months.map(m=>h('tr',{key:m.i,style:{borderBottom:'1px solid #f0f0f0',opacity:m.received===0&&m.cost===0?0.35:1}},
            h('td',{style:{padding:'7px 10px',fontWeight:500}},SM[m.i]),
            h('td',{style:{padding:'7px 10px',textAlign:'right',color:'#666'}},m.invoiced>0?fmt(m.invoiced):'—'),
            h('td',{style:{padding:'7px 10px',textAlign:'right',color:'#1e7e34',fontWeight:m.received>0?500:400}},m.received>0?fmt(m.received):'—'),
            h('td',{style:{padding:'7px 10px',textAlign:'right'}},m.cost>0?fmt(m.cost):'—'),
            h('td',{style:{padding:'7px 10px',textAlign:'right',fontWeight:500,color:m.profit>0?'#1e7e34':m.profit<0?'#b91c1c':'#666'}},m.received>0||m.cost>0?fmt(m.profit):'—'),
            h('td',{style:{padding:'7px 10px',textAlign:'right',color:'#666'}},m.received>0?`${Math.round(m.profit/m.received*100)}%`:'—')
          )),
          h('tr',{style:{background:'#f5f5f5',fontWeight:500}},
            h('td',{style:{padding:'7px 10px'}},'Total'),
            h('td',{style:{padding:'7px 10px',textAlign:'right'}},fmt(tot.invoiced)),
            h('td',{style:{padding:'7px 10px',textAlign:'right',color:'#1e7e34'}},fmt(tot.received)),
            h('td',{style:{padding:'7px 10px',textAlign:'right'}},fmt(tot.cost)),
            h('td',{style:{padding:'7px 10px',textAlign:'right',fontWeight:500,color:tot.profit>=0?'#1e7e34':'#b91c1c'}},fmt(tot.profit)),
            h('td',{style:{padding:'7px 10px',textAlign:'right',color:'#666'}},tot.received>0?`${Math.round(tot.profit/tot.received*100)}%`:'—')
          )
        )
      )
    ),
    sb.length>0&&h('div',{style:sc.card},
      h('div',{style:{fontSize:'13px',fontWeight:500,marginBottom:'10px'}},`Staff cost breakdown — ${yr}`),
      h('table',{style:{width:'100%',fontSize:'13px'}},
        h('thead',null,h('tr',{style:{borderBottom:'1px solid #eee'}},
          ['Staff member','Role',{l:'Payments',r:true},{l:'Total paid',r:true}].map((x,i)=>
            h('th',{key:i,style:{padding:'6px 10px',textAlign:typeof x==='object'&&x.r?'right':'left',fontWeight:500,color:'#666',fontSize:'12px'}},typeof x==='object'?x.l:x)
          )
        )),
        h('tbody',null,sb.map(s=>h('tr',{key:s.id,style:{borderBottom:'1px solid #f0f0f0'}},
          h('td',{style:{padding:'7px 10px'}},
            h('div',{style:{display:'flex',alignItems:'center',gap:'7px'}},

              s.name
            )
          ),
          h('td',{style:{padding:'7px 10px',textTransform:'capitalize',color:'#666',fontSize:'12px'}},s.type?.replace('_',' ')),
          h('td',{style:{padding:'7px 10px',textAlign:'right'}},s.cnt),
          h('td',{style:{padding:'7px 10px',textAlign:'right',fontWeight:500}},fmt(s.paid))
        )))
      )
    )
  );
}

  const [sm,setSM]=useState(new Date().getMonth());
  const [sy,setSY]=useState(new Date().getFullYear());

  useEffect(()=>{

  const setStaffPayments=d=>{setSpS(d);db.set(KEYS.pay,d);};
  const setRemittances=d=>{setRemS(d);db.set(KEYS.rem,d);};

  return h('div',{style:{display:'flex',height:'100vh',overflow:'hidden',background:'#f5f5f5',fontFamily:'-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif'}},
    /* Sidebar */
    h('div',{style:sc.sidebar},
      h('div',{style:{padding:'14px 16px',borderBottom:'1px solid #e0e0e0'}},
        h('div',{style:{fontSize:'14px',fontWeight:500}},'Crown Cars Ltd'),
        h('div',{style:{fontSize:'11px',color:'#888'}},'WSCC supplier 103820')
      ),
      h('nav',{style:{padding:'8px',flex:1}},
        NAV.map(x=>h('button',{key:x.id,onClick:()=>setTab(x.id),style:sc.nav(tab===x.id)},x.lbl))
      ),
      h('div',{style:{padding:'12px 16px',borderTop:'1px solid #e0e0e0',fontSize:'11px',color:'#aaa'}},'School transport management')
    ),
    /* Main content */
    h('div',{style:{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}},
      tab==='dashboard'&&h(Dashboard,{invoices,staff,staffPayments,remittances,sm,sy,setSM,setSY}),
      tab==='remittances'&&h(RemittancesPage,{invoices,remittances,setRemittances,setInvoices}),
      tab==='invoices'&&h(InvoicesPage,{invoices,setInvoices}),
      tab==='staff'&&h(StaffPage,{staff,setStaff,staffPayments}),
      tab==='payments'&&h(PaymentsPage,{staff,staffPayments,setStaffPayments}),
      tab==='reports'&&h(ReportsPage,{invoices,staffPayments,staff})
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App));
</script>
</body>
</html>
